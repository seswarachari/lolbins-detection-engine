title: Certutil Base64 Encode or Decode
id: 2e5d7a1b-6f3c-4d0e-ca4b-7o1f0d2e3a4b
status: experimental
description: |
    Detects certutil.exe being used with -encode or -decode flags for base64
    encoding/decoding of files. Attackers use this technique (T1140) to decode
    staged payloads that were delivered as base64-encoded text files, effectively
    reconstructing executable content from innocuous-looking text.
references:
    - https://lolbas-project.github.io/lolbas/Binaries/Certutil/
    - https://attack.mitre.org/techniques/T1140/
author: Eswar Achari
date: 2024/07/03
modified: 2024/07/03
tags:
    - attack.defense_evasion
    - attack.t1140
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\certutil.exe'
        CommandLine|contains:
            - '-decode'
            - '-encode'
            - '/decode'
            - '/encode'
    condition: selection
falsepositives:
    - PKI administrators encoding/decoding certificates in PEM/DER format
    - IT staff converting certificate formats for application deployment
level: high
